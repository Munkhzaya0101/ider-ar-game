<script src="https://cdn.jsdelivr.net/npm/aframe@1.5.0/dist/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<!doctype html>
<html lang="mn">
    
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AR Танилцуулга</title>

  <!-- CSS -->
  <link rel="stylesheet" href="../shared/css/styles.css" />

  <!-- A-Frame -->
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.5.0/dist/aframe.min.js"></script>

  <!-- MindAR Image Tracking -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>

  <!-- 🔴 AR Scene -->
  <a-scene
    mindar-image="imageTargetSrc: ./targets/ider.mind; autoStart: true; uiScanning: true; uiLoading: true;"
    color-space="sRGB"
    renderer="colorManagement: true, physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: true"
  >
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
  </a-scene>

  <!-- 🔵 UI Card (доод хэсэгт харагдана) -->
  <div class="card" style="position: relative; z-index: 999;">
    <h1>AR танилцуулга (Image Tracking)</h1>
    <p class="small">Одоогоор target файл байхгүй тул model харагдахгүй. Дараагийн алхамд target үүсгэнэ.</p>

    <hr />

    <div id="status" class="small">Unlock: шалгаж байна…</div>

    <div id="unlockedArea" style="display:none; margin-top:12px;">
      <div class="small">✅ Unlock идэвхжлээ</div>
      <div class="small" id="unlockValue" style="margin-top:6px;"></div>
    </div>

    <hr />

    <div class="row">
      <a class="btn" href="../game/index.html">🎮 Тоглоом руу</a>
      <button class="btn" id="clearBtn">🧹 Unlock цэвэрлэх</button>
      <a class="btn" href="../index.html">🏠 Нүүр</a>
    </div>
  </div>

  <script type="module" src="./js/ar-main.js"></script>

</body>
</html>
